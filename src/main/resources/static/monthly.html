<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Month-wise Tracking</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary-grad: linear-gradient(135deg, #6366f1, #a855f7);
            --accent-blue: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --error: #ef4444;

            /* Category Colors */
            --color-food: #6366f1;
            --color-travel: #a855f7;
            --color-shopping: #10b981;
            --color-bills: #f43f5e;
            --color-other: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            position: relative;
            padding: 24px;
        }

        /* Glowing background blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(140px);
            z-index: 0;
            opacity: 0.25;
            pointer-events: none;
            animation: floatBlobs 16s infinite alternate;
        }

        .blob-1 {
            background: #6366f1;
            top: -10%;
            left: -10%;
        }

        .blob-2 {
            background: #a855f7;
            bottom: -10%;
            right: -10%;
            animation-delay: 4s;
        }

        @keyframes floatBlobs {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(60px, 60px) scale(1.1);
            }
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Header Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            margin-bottom: 24px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand img {
            width: 40px;
            height: 40px;
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 10px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--primary-grad);
            border-color: transparent;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* Statistics Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .stat-card.glow {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border-color: rgba(99, 102, 241, 0.25);
        }

        .stat-title {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
        }

        .stat-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            display: block;
        }

        .stat-icon-bg {
            position: absolute;
            right: 16px;
            bottom: 16px;
            color: rgba(255, 255, 255, 0.03);
            width: 48px;
            height: 48px;
            pointer-events: none;
        }

        .stat-card.glow .stat-icon-bg {
            color: rgba(99, 102, 241, 0.06);
        }

        /* Main panels */
        .panel-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.3);
            margin-bottom: 24px;
        }

        .panel-card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
        }

        .panel-card-title i {
            color: #a855f7;
            width: 20px;
            height: 20px;
        }

        /* Trend Chart */
        .chart-container-wrapper {
            position: relative;
            height: 300px;
            margin-bottom: 8px;
        }

        /* Accordion monthly lists */
        .accordion-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .accordion-item {
            border: 1px solid var(--card-border);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            overflow: hidden;
            transition: all 0.3s;
        }

        .accordion-item:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
        }

        .accordion-header {
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .accordion-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .calendar-icon-wrapper {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .month-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        .month-stats-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .accordion-header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .month-total {
            font-size: 16px;
            font-weight: 800;
            color: #ffffff;
        }

        .chevron-icon {
            color: var(--text-muted);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 20px;
            height: 20px;
        }

        .accordion-item.active .chevron-icon {
            transform: rotate(180deg);
            color: #a855f7;
        }

        /* Accordion Content Body */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.15);
            border-top: 0 solid rgba(255, 255, 255, 0.03);
        }

        .accordion-item.active .accordion-content {
            border-top-width: 1px;
            /* Height is set dynamically in JavaScript to allow auto height transition */
        }

        .accordion-content-inner {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Monthly transaction item styling */
        .month-expense-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 10px 16px;
            border-radius: 12px;
        }

        .month-expense-row:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.06);
        }

        .expense-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cat-icon-badge {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cat-svg-small {
            width: 16px;
            height: 16px;
        }

        .cat-food {
            background: rgba(99, 102, 241, 0.15);
            color: var(--color-food);
        }

        .cat-travel {
            background: rgba(168, 85, 247, 0.15);
            color: var(--color-travel);
        }

        .cat-shopping {
            background: rgba(16, 185, 129, 0.15);
            color: var(--color-shopping);
        }

        .cat-bills {
            background: rgba(244, 63, 94, 0.15);
            color: var(--color-bills);
        }

        .cat-other {
            background: rgba(245, 158, 11, 0.15);
            color: var(--color-other);
        }

        .expense-text {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .expense-desc {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .expense-date {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .expense-cost {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
        }

        /* Empty states */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-icon {
            width: 48px;
            height: 48px;
            color: rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
        }

        /* Toast notifications styling */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            max-width: 400px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            color: var(--accent-blue);
        }

        .toast-message {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="dashboard-container">
        <!-- Header -->
        <header>
            <div class="brand">
                <img src="https://cdn-icons-png.flaticon.com/512/2331/2331941.png" alt="Logo">
                <h1>Expense Tracker</h1>
            </div>

            <button class="back-btn" onclick="window.location.href='/index.html'">
                <i data-lucide="arrow-left"></i>
                <span>Back to Dashboard</span>
            </button>
        </header>

        <!-- Stats Cards Grid -->
        <div class="stats-grid">
            <div class="stat-card glow">
                <span class="stat-title">Current Month Spend</span>
                <div class="stat-value">Rs <span id="currentMonthSpend">0</span></div>
                <span class="stat-subtitle" id="currentMonthLabel">Active month details</span>
                <i data-lucide="calendar" class="stat-icon-bg"></i>
            </div>
            <div class="stat-card">
                <span class="stat-title">Average Monthly Spent</span>
                <div class="stat-value">Rs <span id="avgMonthlySpend">0</span></div>
                <span class="stat-subtitle">Calculated across active months</span>
                <i data-lucide="calculator" class="stat-icon-bg"></i>
            </div>
            <div class="stat-card">
                <span class="stat-title">Peak Spending Month</span>
                <div class="stat-value" id="peakMonthVal">Rs 0</div>
                <span class="stat-subtitle" id="peakMonthLabel">No expenses recorded</span>
                <i data-lucide="trending-up" class="stat-icon-bg"></i>
            </div>
        </div>

        <!-- Trend Chart -->
        <div class="panel-card" id="trendChartCard">
            <div class="panel-card-title">
                <i data-lucide="bar-chart-3"></i>
                <span>Historical Spending Trends</span>
            </div>
            <div class="chart-container-wrapper">
                <canvas id="monthlyTrendChart"></canvas>
            </div>
        </div>

        <!-- Month accordion lists -->
        <div class="panel-card">
            <div class="panel-card-title">
                <i data-lucide="layers"></i>
                <span>Monthly Transaction Breakdown</span>
            </div>

            <div class="accordion-container" id="monthlyAccordion">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </div>

    <script>
        // Custom Toast
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.innerHTML = `
                <i data-lucide="info" class="toast-icon"></i>
                <div class="toast-message">${message}</div>
            `;
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        const user = localStorage.getItem("loggedUser");
        if (!user) {
            window.location.href = "/login.html";
        }

        let chartInstance;

        function loadMonthlyAnalytics() {
            fetch("/expenses/" + user)
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) {
                        renderEmptyState();
                        return;
                    }
                    processAndRenderAnalytics(data);
                })
                .catch(err => {
                    showToast("Failed to fetch monthly data.", "error");
                });
        }

        function renderEmptyState() {
            document.getElementById("trendChartCard").style.display = "none";
            const container = document.getElementById("monthlyAccordion");
            container.innerHTML = `
                <div class="empty-state">
                    <i data-lucide="inbox" class="empty-icon"></i>
                    <p>No transactions found. Add some expenses on the dashboard to view analytics!</p>
                </div>
            `;
            lucide.createIcons();
        }

        function processAndRenderAnalytics(expenses) {
            const monthlyGroups = {}; // key: "YYYY-MM" -> { label: "Month Year", total: Number, items: [] }

            expenses.forEach(e => {
                let monthKey = "Unknown";
                let label = "Unknown Date";

                if (e.date) {
                    const d = new Date(e.date);
                    if (!isNaN(d.getTime())) {
                        const year = d.getFullYear();
                        const month = String(d.getMonth() + 1).padStart(2, '0');
                        monthKey = `${year}-${month}`;

                        label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    }
                }

                if (!monthlyGroups[monthKey]) {
                    monthlyGroups[monthKey] = {
                        label: label,
                        total: 0,
                        items: []
                    };
                }

                monthlyGroups[monthKey].total += e.amount;
                monthlyGroups[monthKey].items.push(e);
            });

            // Sort month keys chronologically (oldest to newest for the trend chart)
            const sortedKeys = Object.keys(monthlyGroups).sort();

            // 1. Calculate Stats
            calculateStatistics(monthlyGroups, sortedKeys);

            // 2. Render Chart
            renderChart(monthlyGroups, sortedKeys);

            // 3. Render Accordions (newest month first)
            renderAccordions(monthlyGroups, [...sortedKeys].reverse());
        }

        function calculateStatistics(groups, sortedKeys) {
            // A. Current Month Spent (using actual current calendar month)
            const now = new Date();
            const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

            let currentSpend = 0;
            let currentLabel = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            if (groups[currentMonthKey]) {
                currentSpend = groups[currentMonthKey].total;
            }

            document.getElementById("currentMonthSpend").innerText = currentSpend.toLocaleString('en-IN');
            document.getElementById("currentMonthLabel").innerText = `Spent in ${currentLabel}`;

            // B. Average Monthly Spent
            let totalSpentAllTime = 0;
            let totalMonths = sortedKeys.length;

            sortedKeys.forEach(k => {
                totalSpentAllTime += groups[k].total;
            });

            const avgSpend = totalMonths > 0 ? (totalSpentAllTime / totalMonths) : 0;
            document.getElementById("avgMonthlySpend").innerText = Math.round(avgSpend).toLocaleString('en-IN');

            // C. Peak Spending Month
            let peakKey = "";
            let peakTotal = 0;

            sortedKeys.forEach(k => {
                if (groups[k].total > peakTotal) {
                    peakTotal = groups[k].total;
                    peakKey = k;
                }
            });

            if (peakKey) {
                document.getElementById("peakMonthVal").innerText = `Rs ${peakTotal.toLocaleString('en-IN')}`;
                document.getElementById("peakMonthLabel").innerText = `Recorded in ${groups[peakKey].label}`;
            } else {
                document.getElementById("peakMonthVal").innerText = "Rs 0";
                document.getElementById("peakMonthLabel").innerText = "No data recorded";
            }
        }

        function renderChart(groups, sortedKeys) {
            const ctx = document.getElementById("monthlyTrendChart").getContext("2d");

            const labels = sortedKeys.map(k => groups[k].label);
            const values = sortedKeys.map(k => groups[k].total);

            // Create gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(168, 85, 247, 0.7)'); // Violet
            gradient.addColorStop(1, 'rgba(99, 102, 241, 0.15)'); // Indigo

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Monthly Spend (Rs)',
                        data: values,
                        backgroundColor: gradient,
                        borderColor: '#a855f7',
                        borderWidth: 1.5,
                        borderRadius: 8,
                        hoverBackgroundColor: 'rgba(168, 85, 247, 0.9)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: '#1f2937',
                            titleColor: '#f3f4f6',
                            bodyColor: '#e5e7eb',
                            borderColor: 'rgba(255,255,255,0.08)',
                            borderWidth: 1,
                            padding: 10,
                            callbacks: {
                                label: function (context) {
                                    return ` Total Spent: Rs ${context.raw.toLocaleString('en-IN')}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#9ca3af',
                                font: {
                                    family: "'Plus Jakarta Sans', sans-serif",
                                    size: 11
                                }
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            },
                            ticks: {
                                color: '#9ca3af',
                                font: {
                                    family: "'Plus Jakarta Sans', sans-serif",
                                    size: 11
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderAccordions(groups, sortedKeysDescending) {
            const container = document.getElementById("monthlyAccordion");
            container.innerHTML = "";

            sortedKeysDescending.forEach((k, index) => {
                const group = groups[k];
                const accordionItem = document.createElement("div");
                accordionItem.className = `accordion-item ${index === 0 ? 'active' : ''}`; // Expand first month by default

                // Sort transactions inside each month descending by date
                group.items.sort((a, b) => new Date(b.date) - new Date(a.date));

                let rowsHtml = "";
                group.items.forEach(e => {
                    let catIcon = "tag";
                    let catColorClass = "cat-other";

                    if (e.category === "Food") { catIcon = "utensils"; catColorClass = "cat-food"; }
                    else if (e.category === "Travel") { catIcon = "plane"; catColorClass = "cat-travel"; }
                    else if (e.category === "Shopping") { catIcon = "shopping-bag"; catColorClass = "cat-shopping"; }
                    else if (e.category === "Bills") { catIcon = "credit-card"; catColorClass = "cat-bills"; }

                    let displayDate = "";
                    if (e.date) {
                        const d = new Date(e.date);
                        displayDate = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    }

                    rowsHtml += `
                        <div class="month-expense-row">
                            <div class="expense-info">
                                <div class="cat-icon-badge ${catColorClass}">
                                    <i data-lucide="${catIcon}" class="cat-svg-small"></i>
                                </div>
                                <div class="expense-text">
                                    <span class="expense-desc">${e.description || 'Expense'}</span>
                                    <span class="expense-date">${e.category} ${displayDate ? '• ' + displayDate : ''}</span>
                                </div>
                            </div>
                            <div class="expense-cost">Rs ${e.amount.toLocaleString('en-IN')}</div>
                        </div>
                    `;
                });

                accordionItem.innerHTML = `
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <div class="accordion-header-left">
                            <div class="calendar-icon-wrapper">
                                <i data-lucide="calendar"></i>
                            </div>
                            <div>
                                <div class="month-name">${group.label}</div>
                                <div class="month-stats-meta">${group.items.length} Transactions</div>
                            </div>
                        </div>
                        <div class="accordion-header-right">
                            <div class="month-total">Rs ${group.total.toLocaleString('en-IN')}</div>
                            <i data-lucide="chevron-down" class="chevron-icon"></i>
                        </div>
                    </div>
                    <div class="accordion-content">
                        <div class="accordion-content-inner">
                            ${rowsHtml}
                        </div>
                    </div>
                `;

                container.appendChild(accordionItem);
            });

            // Set max-height for the active accordion on render
            const activeItem = container.querySelector('.accordion-item.active');
            if (activeItem) {
                const content = activeItem.querySelector('.accordion-content');
                content.style.maxHeight = content.scrollHeight + "px";
            }

            lucide.createIcons();
        }

        function toggleAccordion(headerElement) {
            const item = headerElement.parentElement;
            const content = item.querySelector('.accordion-content');
            const isActive = item.classList.contains('active');

            // Close all other accordions
            const siblingItems = document.querySelectorAll('.accordion-item');
            siblingItems.forEach(sibling => {
                if (sibling !== item && sibling.classList.contains('active')) {
                    sibling.classList.remove('active');
                    sibling.querySelector('.accordion-content').style.maxHeight = null;
                }
            });

            if (isActive) {
                item.classList.remove('active');
                content.style.maxHeight = null;
            } else {
                item.classList.add('active');
                content.style.maxHeight = content.scrollHeight + "px";
            }
        }
    </script>

    <!-- Run initial load -->
    <script>
        loadMonthlyAnalytics();
        lucide.createIcons();
    </script>
</body>

</html>
